# Docker Compose Configuration for Media Server Stack
#
# This stack includes:
#   - SABnzbd: Usenet downloader (port 8080)
#   - Sonarr: TV show management (port 8989)
#   - Radarr: Movie management (port 7878)
#   - Jellyfin: Media server (port 8096)
#   - Jellyseerr: Media request management (port 5055)
#
# All services are connected via the 'streaming-network' bridge network
# and run with PUID/PGID 1000 for consistent file permissions

services:

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    ports:
      - "8080:8080"
    volumes:
      - /mnt/scratch/downloads:/downloads
      - ~/docker/docker-config/sabnzbd:/config
    restart: unless-stopped
    networks:
      - streaming-network
    environment:
      - PUID=1000
      - PGID=1000

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - /media-pool/tv:/tv
      - ~/docker/docker-config/sonarr:/config
      - /mnt/scratch/downloads/:/downloads
    restart: unless-stopped
    networks:
      - streaming-network
    environment:
      - PUID=1000
      - PGID=1000

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - /media-pool/movies:/movies
      - ~/docker/docker-config/radarr:/config
      - /mnt/scratch/downloads/:/downloads
    restart: unless-stopped
    networks:
      - streaming-network
    environment:
      - PUID=1000
      - PGID=1000

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "993"
    environment:
      - PUID=1000
      - PGID=1000
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
      - NEOReadDebugKeys=1
      - OverrideGpuAddressSpace=48
      - JELLYFIN_CACHE_DIR=/config/cache
      - JELLYFIN_DATA_DIR=/config/data
      - JELLYFIN_LOG_DIR=/config/log
      - JELLYFIN_TRANSCODE_DIR=/tmp/jellyfin-transcode
    volumes:
      - ~/docker/docker-config/jellyfin:/config
      - ./jellyfin/cache:/cache
      - /media-pool/movies:/movies:ro
      - /media-pool/tv:/tv:ro
      - type: tmpfs
        target: /transcode
        tmpfs:
          size: 8589934592
    restart: unless-stopped
    networks:
      - streaming-network

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Amsterdam
      - PORT=5055 #optional
      - PUID=1000
      - PGID=1000
    ports:
      - 5055:5055
    volumes:
      - ~/docker/docker-config/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - streaming-network

networks:
  streaming-network:
    driver: bridge
